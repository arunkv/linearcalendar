<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Orange rounded-square background -->
  <rect width="32" height="32" rx="7" fill="#f97316"/>

  <!--
    12 mini month-blocks: 4 columns × 3 rows
    Column x-origins : 3, 10, 17, 23.5
    Row y-origins    : 3, 12, 21
    Block size       : 5.5 w × 7.5 h
    Gap              : 1.5 px between blocks
  -->

  <!-- ── Row 1 ── -->
  <rect x="3"    y="3"  width="5.5" height="7.5" rx="1.25" fill="rgba(255,255,255,0.3)"/>
  <rect x="10"   y="3"  width="5.5" height="7.5" rx="1.25" fill="rgba(255,255,255,0.3)"/>
  <rect x="17"   y="3"  width="5.5" height="7.5" rx="1.25" fill="rgba(255,255,255,0.3)"/>
  <rect x="23.5" y="3"  width="5.5" height="7.5" rx="1.25" fill="rgba(255,255,255,0.3)"/>

  <!-- ── Row 2 ── -->
  <rect x="3"    y="12" width="5.5" height="7.5" rx="1.25" fill="rgba(255,255,255,0.3)"/>
  <rect x="10"   y="12" width="5.5" height="7.5" rx="1.25" fill="rgba(255,255,255,0.3)"/>

  <!-- ── Highlighted "current month" block ── -->
  <rect x="17"   y="12" width="5.5" height="7.5" rx="1.25" fill="white"/>
  <!-- Mini header strip -->
  <rect x="17"   y="12" width="5.5" height="2"   rx="1.25" fill="#fed7aa"/>
  <rect x="17"   y="13" width="5.5" height="1"          fill="#fed7aa"/>
  <!-- Tiny date lines -->
  <rect x="18.2" y="15"   width="3.1" height="0.9" rx="0.45" fill="#fed7aa"/>
  <rect x="18.2" y="16.4" width="2.4" height="0.9" rx="0.45" fill="#fed7aa"/>
  <rect x="18.2" y="17.8" width="2.8" height="0.9" rx="0.45" fill="#fed7aa"/>

  <rect x="23.5" y="12" width="5.5" height="7.5" rx="1.25" fill="rgba(255,255,255,0.3)"/>

  <!-- ── Row 3 ── -->
  <rect x="3"    y="21" width="5.5" height="7.5" rx="1.25" fill="rgba(255,255,255,0.3)"/>
  <rect x="10"   y="21" width="5.5" height="7.5" rx="1.25" fill="rgba(255,255,255,0.3)"/>
  <rect x="17"   y="21" width="5.5" height="7.5" rx="1.25" fill="rgba(255,255,255,0.3)"/>
  <rect x="23.5" y="21" width="5.5" height="7.5" rx="1.25" fill="rgba(255,255,255,0.3)"/>
</svg>
